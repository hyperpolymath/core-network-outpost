# SPDX-License-Identifier: MPL-2.0
# images.lock — committed single source of truth for pinned container bases.
#
# This file IS version-controlled (unlike .env). The pinned digest below is the
# reproducible "base" the outpost boots from. It is MAINTAINER-GATED: do not
# hand-edit the digest — change it only via `bin/bump.sh --apply`, which
# re-resolves the sha from source and repins after you explicitly confirm.
#
# Shell-sourceable (KEY=value). The digest is a MULTI-ARCH manifest-list digest,
# so it resolves the correct per-arch image automatically (armv7 on a Pi 2B,
# aarch64 on a Pi 4, etc.) — verified to include linux/arm/v7.

# --- AdGuard Home -------------------------------------------------------------
