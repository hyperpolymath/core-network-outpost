#
# chrony.conf — dependable, authenticated time for the core-network-outpost estate.
# Foundational [dep+]: TLS/cert checks, DNSSEC in AdGuard, log correlation, SPA
# replay windows, cron and the bump/canary schedule all fail silently on bad time.
#
# VALIDATE BEFORE APPLY:  chronyd -p -f /etc/chrony/chrony.conf
# Portable across Alpine (2B) and Debian (N100) — same file, same daemon.

# --- Upstream sources -------------------------------------------------------
# Authenticated (NTS) first — a man-in-the-middle cannot shift these.
server time.cloudflare.com iburst nts
server nts.netnod.se        iburst nts
server ptbtime1.ptb.de      iburst nts
# Unauthenticated pool for breadth/quorum (helps outvote a lying source).
pool 2.pool.ntp.org         iburst maxsources 3

# Router = cross-check ONLY. `noselect` measures its offset (export it to the
# dashboard) but NEVER steers from it — a mediocre or spoofable router clock can
# then never drag you off. Drop `noselect` to let it join the quorum vote.
# Replace with your gateway IP.
server 192.168.1.1 iburst noselect

# --- Clock discipline (robust for a possibly-RTC-less, sometimes-offline box) -
driftfile /var/lib/chrony/drift
makestep 1.0 3          # step (not slew) if >1s off in the first 3 updates —
                        # vital on a no-RTC Pi that boots with the wrong time.
rtcsync                 # discipline the RTC where one exists (N100); harmless without.
maxupdateskew 100.0
leapsectz right/UTC

# --- Offline resilience [dep+] ---------------------------------------------
# If ALL upstreams are unreachable (internet down), keep serving a coherent clock
# to the LAN as a low-stratum orphan, so the estate stays time-consistent.
local stratum 10 orphan

# --- Serve time to the LAN (internal-only — see monitoring-internal-only.nft) --
# Assumes a STATIC LAN IP. Bind to it (never 0.0.0.0/WAN); allow only your subnet.
bindaddress 192.168.1.2
allow 192.168.1.0/24
# Belt-and-braces: the host firewall should also restrict udp/123 to the LAN.

# --- Logging (bounded — pair with log2ram / journald caps, HARDENING §6) ------
logdir /var/log/chrony
log tracking measurements statistics
