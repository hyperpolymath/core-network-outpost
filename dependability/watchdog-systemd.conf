#
# /etc/systemd/system.conf.d/watchdog.conf   [dep+]  (Debian/systemd hosts, e.g. N100)
#
# Hardware watchdog: if PID 1 stops petting /dev/watchdog, the SoC hard-resets a
# hung box — recovers an unattended appliance no human is watching.
#
# Needs a watchdog device:  ls -l /dev/watchdog*   (Pi: bcm2835_wdt; N100: iTCO_wdt)
# VALIDATE after edit:  systemd-analyze cat-config systemd/system.conf | grep -i watchdog
#
# Alpine/OpenRC 2B does NOT read this — use the `watchdog` package there instead:
#   apk add watchdog
#   echo 'watchdog-device = /dev/watchdog' >> /etc/watchdog.conf
#   rc-update add watchdog && rc-service watchdog start
[Manager]
RuntimeWatchdogSec=20s
RebootWatchdogSec=2min
KExecWatchdogSec=2min
